name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  APP_NAME: okc
  DEPLOY_PATH: /opt/okc

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install SQLite dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
          -o okc ./cmd/okc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: okc-binary
          path: okc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: okc-binary

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "okc"
          target: "/tmp/"

      - name: Install and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo systemctl stop okc || true
            sudo mv /tmp/okc /opt/okc/okc
            sudo chmod +x /opt/okc/okc
            sudo systemctl start okc
            echo "✅ Deployed version ${{ github.sha }}"
